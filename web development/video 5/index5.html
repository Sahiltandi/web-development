<!-- image, table(theader, body, footer), lists(unordered, ordered, description) ul (unordered list), ol (ordered list), dl (description list), dt (description term), dd (description definition) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style5.css">
</head>
<body>
    <img width="800" height="" src="image.png" alt="Train Image">
    <table> <!--//table tag is used to create a table in HTML -->
        <thead> <!--//thead tag is used to group the header content in a table -->
            <tr> <!--//tr tag is used to define a row in a table -->
                <th colspan="2">User Information</th>
            </tr>
        </thead>
        <tbody> <!--//tbody tag is used to group the body content in a table -->
            <tr>
                <th>name</th>
                <th>age</th>
            </tr>
            <tr>
                <td>John</td>
                <td>30</td>
            </tr>
        </tbody>    
        <tfoot> <!--//tfoot tag is used to group the footer content in a table -->
            <tr>
                <td colspan="2">End of Table</td>
            </tr>
        </tfoot>
    </table>

    <ul> <!--//ul tag is used to create an unordered list in HTML -->
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <ol> <!--//ol tag is used to create an ordered list in HTML -->
        <li  >HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>
    <dl> <!--//dl tag is used to create a description list in HTML -->
        <dt>HTML</dt> <!--//dt tag is used to define a term in a description list -->
        <dd>HyperText Markup Language</dd> <!--//dd tag is used to describe the term in a description list -->
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JavaScript</dt>
        <dd>A programming language for the web</dd>
    </dl>
</body>
</html>
